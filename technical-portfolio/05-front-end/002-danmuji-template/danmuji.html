<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站风格弹幕输入框</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .demo-container {
      width: 100%;
      max-width: 1200px;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    
    .video-area {
      width: 100%;
      height: 600px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
    }
    
    .video-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }
    
    .video-placeholder h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    #danmaku-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    
    .danmaku-item {
      position: absolute;
      white-space: nowrap;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-shadow: 
        -1px -1px 2px rgba(0,0,0,0.9),
        1px -1px 2px rgba(0,0,0,0.9),
        -1px 1px 2px rgba(0,0,0,0.9),
        1px 1px 2px rgba(0,0,0,0.9);
      left: 0;
      animation: danmaku-scroll linear forwards;
    }
    
    @keyframes danmaku-scroll {
      from { 
        transform: translateX(100vw);
      }
      to { 
        transform: translateX(-100%);
      }
    }
    
    .danmaku-input-bar {
      position: absolute;
      bottom: 80px;
      left: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      padding: 10px 15px;
      border-radius: 8px;
      z-index: 100;
    }
    
    .gift-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .gift-icon:hover {
      transform: scale(1.1);
    }
    
    .danmaku-input-wrapper {
      flex: 1;
      position: relative;
    }
    
    #danmaku-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      outline: none;
      transition: background 0.3s;
    }
    
    #danmaku-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    #danmaku-input:focus {
      background: rgba(255, 255, 255, 0.25);
    }
    
    .etiquette-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      padding: 4px 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .etiquette-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    
    #send-btn {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: bold;
      background: #00A1D6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    #send-btn:hover {
      background: #00b5e5;
    }
    
    #send-btn:active {
      transform: scale(0.95);
    }
    
    #send-btn:disabled {
      background: rgba(255, 255, 255, 0.2);
      cursor: not-allowed;
    }
    
    .bottom-info {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.8);
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stats {
      display: flex;
      gap: 20px;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .settings-panel {
      position: absolute;
      bottom: 140px;
      left: 20px;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 8px;
      padding: 15px;
      display: none;
      z-index: 101;
    }
    
    .settings-panel.active {
      display: block;
    }
    
    .color-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s;
    }
    
    .color-option:hover {
      transform: scale(1.1);
    }
    
    .color-option.active {
      border-color: white;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    
    .setting-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="video-area">

        
      <div class="video-placeholder">
        <h2>视频播放区域</h2>
        <p>弹幕会从这里飞过</p>
      </div>
      
      <div id="danmaku-layer"></div>
      
      <div class="danmaku-input-bar">
        <div class="gift-icon" id="settingsBtn">
          &#x1F3A8;
        </div>
        
        <div class="danmaku-input-wrapper">
          <input 
            type="text" 
            id="danmaku-input" 
            placeholder="发个友善的弹幕见证当下"
            maxlength="100"
          >
          <button class="etiquette-btn" id="etiquetteBtn">
            弹幕礼仪
          </button>
        </div>
        
        <button id="send-btn">发送</button>
      </div>
      
      <div class="settings-panel" id="settingsPanel">
        <div class="setting-label">弹幕颜色</div>
        <div class="color-selector" id="colorSelector">
          <div class="color-option active" data-color="#FFFFFF" style="background: #FFFFFF;"></div>
          <div class="color-option" data-color="#FF6B9D" style="background: #FF6B9D;"></div>
          <div class="color-option" data-color="#FFA500" style="background: #FFA500;"></div>
          <div class="color-option" data-color="#00D4FF" style="background: #00D4FF;"></div>
          <div class="color-option" data-color="#9B59B6" style="background: #9B59B6;"></div>
          <div class="color-option" data-color="#2ECC71" style="background: #2ECC71;"></div>
           <div class="color-option" data-color="#3f444d" style="background: #3f444d;"></div>
        </div>
      </div>
    </div>
    
    <div class="bottom-info">
      <div class="stats">
        <div class="stat-item">
          <span>当前弹幕:</span>
          <span id="danmakuCount">0</span>
        </div>
        <div class="stat-item">
          <span>总发送:</span>
          <span id="totalCount">0</span>
        </div>
      </div>
      <div style="color: rgba(255, 255, 255, 0.4); font-size: 12px;">
        按 Enter 发送
      </div>
    </div>
  </div>

  <script>
    var danmakuLayer = document.getElementById('danmaku-layer');
    var input = document.getElementById('danmaku-input');
    var sendBtn = document.getElementById('send-btn');
    var danmakuCountSpan = document.getElementById('danmakuCount');
    var totalCountSpan = document.getElementById('totalCount');
    var settingsPanel = document.getElementById('settingsPanel');
    var settingsBtn = document.getElementById('settingsBtn');
    var etiquetteBtn = document.getElementById('etiquetteBtn');
    var colorSelector = document.getElementById('colorSelector');
    
    var danmakuCount = 0;
    var totalCount = 0;
    var selectedColor = '#FFFFFF';
    
    function sendDanmaku() {
      var text = input.value.trim();
      if (!text) return;
      
      createDanmaku(text, selectedColor);
      input.value = '';
      totalCount++;
      totalCountSpan.textContent = totalCount;
      
      saveDanmaku(text, selectedColor);
    }
    
    function createDanmaku(text, color) {
      var danmaku = document.createElement('div');
      danmaku.className = 'danmaku-item';
      danmaku.textContent = text;
      danmaku.style.color = color;
      danmaku.style.top = (Math.random() * 70 + 10) + '%';
      
      danmakuLayer.appendChild(danmaku);
      
      var screenWidth = danmakuLayer.offsetWidth;
      var danmakuWidth = danmaku.offsetWidth;
      var totalDistance = screenWidth + danmakuWidth;
      var speed = 150;
      var duration = totalDistance / speed;
      
      danmaku.style.animationDuration = duration + 's';
      
      danmakuCount++;
      updateCount();
      
      setTimeout(function() {
        if (danmaku.parentNode) {
          danmaku.remove();
          danmakuCount--;
          updateCount();
        }
      }, duration * 1000);
    }
    
    function updateCount() {
      danmakuCountSpan.textContent = danmakuCount;
    }
    
    function saveDanmaku(text, color) {
      var danmakus = JSON.parse(localStorage.getItem('myDanmakus') || '[]');
      danmakus.push({
        text: text,
        color: color,
        timestamp: Date.now(),
        date: new Date().toLocaleString('zh-CN')
      });
      localStorage.setItem('myDanmakus', JSON.stringify(danmakus));
    }
    
    function viewHistory() {
      var danmakus = JSON.parse(localStorage.getItem('myDanmakus') || '[]');
      console.log('历史弹幕记录:', danmakus);
      return danmakus;
    }
    
    sendBtn.addEventListener('click', sendDanmaku);
    
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendDanmaku();
      }
    });
    
    settingsBtn.addEventListener('click', function() {
      settingsPanel.classList.toggle('active');
    });
    
    etiquetteBtn.addEventListener('click', function() {
      alert('弹幕礼仪提醒:\n\n文明发言，友善交流\n尊重他人，理性讨论\n禁止刷屏、辱骂\n禁止剧透、引战');
    });
    
    colorSelector.addEventListener('click', function(e) {
      if (e.target.classList.contains('color-option')) {
        var options = document.querySelectorAll('.color-option');
        for (var i = 0; i < options.length; i++) {
          options[i].classList.remove('active');
        }
        e.target.classList.add('active');
        selectedColor = e.target.getAttribute('data-color');
      }
    });
    
    document.addEventListener('click', function(e) {
      if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
        settingsPanel.classList.remove('active');
      }
    });
    
    input.addEventListener('input', function() {
      sendBtn.disabled = input.value.trim() === '';
    });
  </script>
</body>
</html>
